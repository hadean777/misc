spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/login_db?TimeZone=UTC
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  thymeleaf:
    cache: false

server:
  port: 9090

logging:
  level:
    org.springframework.security: DEBUG
